server {
    listen       ${PORT};
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(jpg|jpeg|png|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
