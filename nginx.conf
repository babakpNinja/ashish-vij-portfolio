server {
    listen       ${PORT};
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # HTML: never let a browser sit on stale markup — always revalidate.
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Static assets: long cache. The HTML always references a versioned URL.
    location ~* \.(jpg|jpeg|png|css|js|woff2?|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
